name: notulensi
description: "Notulensi: 100% Offline Private Meeting Assistant"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  
  # Persistence
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.2
  
  # Security
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.1.8
  
  # DI & Routing
  get_it: ^7.6.7
  go_router: ^13.2.0
  
  # UI & Design System
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  
  # Intelligence (Optional for now, but planned)
  speech_to_text: ^7.3.0
  record: ^5.1.0
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Code Generation
  isar_generator: ^3.1.0+1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
  
