interface:
  display_name: "domain-modeling"
  short_description: "Generates a DDD domain model (entities, value objects, aggregates, domain events, repositories, glossary). DO NOT use for DB schema design or API design."

policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "@modelcontextprotocol/server-sequential-thinking"
      description: "Structured multi-step reasoning for complex problem solving"
    - type: "mcp"
      value: "@modelcontextprotocol/server-memory"
      description: "Persistent knowledge graph memory across sessions"
