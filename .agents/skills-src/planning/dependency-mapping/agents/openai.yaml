interface:
  display_name: "dependency-mapping"
  short_description: "Maps dependencies, identifies circular/risky dependencies, and recommends decoupling. DO NOT use for package management or build configuration."

policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "@modelcontextprotocol/server-sequential-thinking"
      description: "Structured multi-step reasoning for complex problem solving"
    - type: "mcp"
      value: "@modelcontextprotocol/server-memory"
      description: "Persistent knowledge graph memory across sessions"
