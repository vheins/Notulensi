interface:
  display_name: "competitor-analysis"
  short_description: "Map the competitive landscape, comparing existing solutions across features, pricing, strengths, and weaknesses. Do NOT use for value proposition writing, user persona creation, or feature prioritization."

policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "@upstash/context7-mcp"
      description: "Up-to-date library documentation and code examples"
    - type: "mcp"
      value: "@modelcontextprotocol/server-memory"
      description: "Persistent knowledge graph memory across sessions"
