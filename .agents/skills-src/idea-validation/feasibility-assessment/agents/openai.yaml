interface:
  display_name: "feasibility-assessment"
  short_description: "Evaluate product idea feasibility (technical, financial, time) before building, with risk flags and Go/No-Go recommendation. Do NOT use for MVP scope definition, feature prioritization, or market sizing."

policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "@upstash/context7-mcp"
      description: "Up-to-date library documentation and code examples"
    - type: "mcp"
      value: "@modelcontextprotocol/server-memory"
      description: "Persistent knowledge graph memory across sessions"
