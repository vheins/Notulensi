interface:
  display_name: "dependency-upgrade"
  short_description: "Use to upgrade one or more dependencies to newer versions, including breaking change analysis, step-by-step migration instructions, and a rollback plan. Activate for library upgrades, framework version bumps, or security patch updates. Do NOT use for adding new dependencies, removing unused packages, or full stack migrations."

policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "@upstash/context7-mcp"
      description: "Up-to-date library documentation and code examples"
