interface:
  display_name: "refactoring"
  short_description: "Use to improve existing code quality — readability, maintainability, or performance — without changing its observable behavior. Activate for cleaning up code, reducing complexity, or applying better patterns to working code. Do NOT use for adding new features, fixing bugs, or generating code from scratch."

policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "@modelcontextprotocol/server-sequential-thinking"
      description: "Structured multi-step reasoning for complex problem solving"
    - type: "mcp"
      value: "@upstash/context7-mcp"
      description: "Up-to-date library documentation and code examples"
    - type: "mcp"
      value: "@modelcontextprotocol/server-memory"
      description: "Persistent knowledge graph memory across sessions"
