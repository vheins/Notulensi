interface:
  display_name: "background-job-queue-worker"
  short_description: "Use to implement background job processing with a queue, worker, retry with exponential backoff, dead letter queue, and monitoring. Activate when the request involves offloading work from the request cycle (emails, reports, data processing). Do NOT use for real-time event streaming, webhook handling, or scheduled cron jobs."

policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "@upstash/context7-mcp"
      description: "Up-to-date library documentation and code examples"
