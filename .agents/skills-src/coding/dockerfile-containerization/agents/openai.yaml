interface:
  display_name: "dockerfile-containerization"
  short_description: "Use to containerize an application with an optimized Dockerfile and docker-compose configuration. Activate for creating Docker images, multi-stage builds, or local development container setups. Do NOT use for Kubernetes manifests, CI/CD pipeline configuration, or cloud container service setup."

policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "@upstash/context7-mcp"
      description: "Up-to-date library documentation and code examples"
