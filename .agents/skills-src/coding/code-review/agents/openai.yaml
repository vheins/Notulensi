interface:
  display_name: "code-review"
  short_description: "Use when a developer needs a thorough review of existing code before merging — covering bugs, security vulnerabilities, style violations, and improvement opportunities. Activate when the request involves reviewing a PR, function, or module for quality and correctness. Do NOT use for refactoring, generating new code, or writing tests."

policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "@modelcontextprotocol/server-sequential-thinking"
      description: "Structured multi-step reasoning for complex problem solving"
    - type: "mcp"
      value: "@upstash/context7-mcp"
      description: "Up-to-date library documentation and code examples"
