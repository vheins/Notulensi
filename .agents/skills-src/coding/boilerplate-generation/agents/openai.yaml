interface:
  display_name: "boilerplate-generation"
  short_description: "Use to scaffold a new project from scratch — generating directory structure, configuration files, entry points, and a README skeleton. Activate when starting a new project, service, or package and needing a production-ready starting point. Do NOT use for adding features to existing projects, generating tests, or CI/CD configuration."

policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "@upstash/context7-mcp"
      description: "Up-to-date library documentation and code examples"
