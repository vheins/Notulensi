interface:
  display_name: "design-pattern-application"
  short_description: "Use when a developer has a design problem and needs help identifying and implementing the most appropriate design pattern. Activate for structuring code around a recurring architectural challenge, applying OOP or functional patterns, or improving extensibility. Do NOT use for refactoring without a pattern goal, API design, or database schema design."

policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "@upstash/context7-mcp"
      description: "Up-to-date library documentation and code examples"
