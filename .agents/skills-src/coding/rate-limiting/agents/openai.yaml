interface:
  display_name: "rate-limiting"
  short_description: "Use to implement rate limiting middleware for API endpoints to prevent abuse and protect backend resources. Activate for configurable request limits, response headers, and bypass rules for trusted clients. Do NOT use for authentication, API gateway configuration, or DDoS protection at the infrastructure level."

policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "@upstash/context7-mcp"
      description: "Up-to-date library documentation and code examples"
