interface:
  display_name: "graphql-schema-generation"
  short_description: "Generate a GraphQL schema for a domain, including types, queries, mutations, subscriptions, directives, and resolvers. Do NOT use for REST API design, OpenAPI spec generation, or GraphQL client code generation."

policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "@upstash/context7-mcp"
      description: "Up-to-date library documentation and code examples"
