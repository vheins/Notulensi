interface:
  display_name: "database-query-optimization"
  short_description: "Use when a developer has a slow or expensive database query and needs analysis, index recommendations, and a rewritten optimized version. Activate for query performance, EXPLAIN output interpretation, or index strategy for any relational or document database. Do NOT use for schema design from scratch, ORM configuration, or general database architecture."

policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "@modelcontextprotocol/server-sequential-thinking"
      description: "Structured multi-step reasoning for complex problem solving"
    - type: "mcp"
      value: "@upstash/context7-mcp"
      description: "Up-to-date library documentation and code examples"
